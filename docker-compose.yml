services:
  postgres:
    image: postgres:16
    container_name: dcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dcms
    ports:
      - "5432:5432"
    volumes:
      - dcms_pg_data:/var/lib/postgresql/data

volumes:
  dcms_pg_data:
